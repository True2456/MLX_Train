# Configuration for Theory specialist LoRA adapter on Gemma 4 12B
model: "models/gemma12b/base_gemma4_shim"
train: true
data: "curated/specialists/gemma12b/theory"
adapter_path: "models/gemma12b/theory_lora"
num_layers: 48
batch_size: 2
iters: 2000
learning_rate: 1e-5
save_every: 100
max_seq_length: 4096
lora_parameters:
  rank: 16
  alpha: 32
  dropout: 0.05
  scale: 10.0
