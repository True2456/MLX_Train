# Configuration for ASM/Systems (Expert 4) specialist LoRA adapter on Gemma 4 12B
model: "models/gemma12b/base_gemma4_shim"
train: true
data: "curated/specialists/gemma12b/asm_systems"
adapter_path: "models/gemma12b/asm_systems_lora"
num_layers: 48
batch_size: 4
iters: 2500
learning_rate: 1e-5
save_every: 100
max_seq_length: 8192
grad_checkpoint: true
lora_parameters:
  rank: 16
  alpha: 32
  dropout: 0.05
  scale: 10.0
