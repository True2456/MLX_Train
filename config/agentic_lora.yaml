# Configuration for Agentic (Expert 2) specialist LoRA adapter on Gemma 4 12B
model: "models/gemma12b/base_gemma4_shim"
train: true
data: "curated/specialists/gemma12b/agentic"
adapter_path: "models/gemma12b/agentic_lora"
num_layers: 48
batch_size: 2
iters: 3000
learning_rate: 1e-5
save_every: 100
grad_checkpoint: true
max_seq_length: 4096
lora_parameters:
  rank: 16
  alpha: 32
  dropout: 0.05
  scale: 10.0
